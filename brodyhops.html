
<html>
<head>
<title>Brody's Site</title>
<style>
body {
  background-color: black;
  margin: 0;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  height: 100vh;
  padding: 20px;
  box-sizing: border-box;
  transition: background-color 0.5s;
}
h1, h2, p {
  color: white;
  text-align: center;
  margin: 10px 0;
}
.cta-button {
    display: inline-block;
    text-decoration: none;
    background-color: white;
    color: black;
    padding: 12px 24px;
    border: 2px solid white;
    font-size: 16px;
    font-weight: bold;
    cursor: pointer;
    border-radius: 4px;
    text-align: center;
    transition: all 0.3s ease;
}
.cta-button:hover {
    background-color: transparent;
    color: white;
}
.trail-particle {
    position: fixed;
    top: 0;
    left: 0;
    width: 12px;
    height: 12px;
    background-color: #ff0000;
    border-radius: 50%;
    pointer-events: none;
    transform: translate(-50%, -50%);
    animation: fadeAndShrink 0.6s ease-out forwards;
    z-index: 9999;
}
@keyframes fadeAndShrink {
    0% { opacity: 1; transform: translate(-50%, -50%) scale(1); }
    100% { opacity: 0; transform: translate(-50%, -50%) scale(0.1); }
}
#pet-wrap {
    position: fixed;
    bottom: 60px;
    left: 20px;
    z-index: 99999;
    cursor: pointer;
    user-select: none;
}
#pet-canvas {
    display: block;
    image-rendering: pixelated;
    width: 64px;
    height: 64px;
}
#pet-bubble {
    position: absolute;
    bottom: 70px;
    left: 0;
    background: white;
    color: black;
    font-family: sans-serif;
    font-size: 12px;
    padding: 6px 10px;
    border-radius: 10px;
    display: none;
    white-space: nowrap;
}
#pet-bubble::after {
    content: '';
    position: absolute;
    bottom: -6px;
    left: 12px;
    border-width: 6px 5px 0;
    border-style: solid;
    border-color: white transparent transparent;
}

/* === GAMES PANEL === */
#games-btn {
    position: fixed;
    top: 14px;
    left: 14px;
    background: #222;
    color: white;
    border: 1px solid #444;
    font-family: sans-serif;
    font-size: 13px;
    padding: 8px 14px;
    border-radius: 8px;
    cursor: pointer;
    z-index: 99999;
}
#games-panel {
    display: none;
    position: fixed;
    top: 50px;
    left: 14px;
    background: #111;
    border: 1px solid #444;
    border-radius: 12px;
    padding: 12px;
    z-index: 99999;
    font-family: sans-serif;
    gap: 8px;
    flex-direction: column;
}
#games-panel button {
    background: #222;
    color: white;
    border: 1px solid #555;
    padding: 8px 14px;
    border-radius: 8px;
    cursor: pointer;
    font-size: 13px;
    text-align: left;
}
#games-panel button:hover { background: #333; }

/* === MODAL === */
#modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.85);
    z-index: 999999;
    align-items: center;
    justify-content: center;
}
#modal-overlay.open { display: flex; }
#modal-box {
    background: #111;
    border: 1px solid #444;
    border-radius: 16px;
    padding: 20px;
    max-width: 95vw;
    max-height: 90vh;
    overflow: auto;
    position: relative;
    font-family: sans-serif;
    color: white;
}
#modal-close {
    position: absolute;
    top: 10px; right: 14px;
    background: none;
    border: none;
    color: #aaa;
    font-size: 22px;
    cursor: pointer;
}
#modal-title {
    font-size: 18px;
    font-weight: bold;
    margin-bottom: 14px;
}
#modal-content { min-width: 280px; }

/* Snake */
#snake-canvas { display: block; background: #000; border: 1px solid #333; }
#snake-score { margin-bottom: 8px; font-size: 14px; color: #aaa; }

/* Pong */
#pong-canvas { display: block; background: #000; border: 1px solid #333; }
#pong-score { margin-bottom: 8px; font-size: 14px; color: #aaa; }

/* Whack */
#whack-grid { display: grid; grid-template-columns: repeat(3,80px); gap: 8px; margin-top: 8px; }
.mole-hole {
    width: 80px; height: 80px;
    background: #222;
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 36px;
    cursor: pointer;
    border: 2px solid #444;
    user-select: none;
}
#whack-score { font-size: 14px; color: #aaa; margin-bottom: 8px; }

/* Typing */
#typing-text { font-size: 16px; color: #888; margin-bottom: 10px; line-height: 1.6; }
#typing-text span.done { color: #4f4; }
#typing-text span.wrong { color: #f44; background: #300; }
#typing-text span.current { background: #555; }
#typing-input { background: #222; border: 1px solid #555; color: white; padding: 8px; border-radius: 6px; width: 100%; box-sizing: border-box; font-size: 14px; }
#typing-stats { margin-top: 8px; font-size: 13px; color: #aaa; }

/* RPS */
#rps-btns { display: flex; gap: 10px; margin: 10px 0; }
#rps-btns button { font-size: 28px; background: #222; border: 1px solid #555; border-radius: 10px; padding: 10px 16px; cursor: pointer; }
#rps-result { font-size: 15px; margin-top: 8px; min-height: 24px; }
#rps-score { font-size: 13px; color: #aaa; }

/* Memory */
#memory-grid { display: grid; grid-template-columns: repeat(4,60px); gap: 8px; margin-top: 8px; }
.mem-card {
    width: 60px; height: 60px;
    background: #333;
    border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
    font-size: 26px;
    cursor: pointer;
    border: 2px solid #555;
    transition: transform 0.2s;
    user-select: none;
}
.mem-card.flipped { background: #222; border-color: #aaa; }
.mem-card.matched { background: #143; border-color: #4f4; }
#memory-moves { font-size: 13px; color: #aaa; margin-bottom: 8px; }

/* Magic 8 ball */
#ball-display {
    width: 140px; height: 140px;
    background: #111;
    border-radius: 50%;
    border: 4px solid #222;
    display: flex; align-items: center; justify-content: center;
    margin: 12px auto;
    font-size: 13px;
    text-align: center;
    padding: 10px;
    box-sizing: border-box;
    color: #8af;
    font-weight: bold;
}
#ball-q { width: 100%; background: #222; border: 1px solid #555; color: white; padding: 8px; border-radius: 6px; font-size: 14px; box-sizing: border-box; margin-bottom: 8px; }

/* Hacker terminal */
#hacker-canvas-wrap {
    background: #000;
    border: 1px solid #0f0;
    border-radius: 8px;
    padding: 10px;
    font-family: monospace;
    font-size: 13px;
    color: #0f0;
    height: 260px;
    overflow: hidden;
    white-space: pre-wrap;
    word-break: break-all;
}

/* Drawing canvas */
#draw-canvas { display: block; background: #000; border: 1px solid #333; cursor: crosshair; touch-action: none; }
#draw-controls { display: flex; gap: 8px; align-items: center; margin-bottom: 8px; flex-wrap: wrap; }
#draw-controls input[type=color] { width: 36px; height: 36px; border: none; background: none; cursor: pointer; }
#draw-controls input[type=range] { width: 80px; }
#draw-controls button { background: #222; color: white; border: 1px solid #555; padding: 6px 12px; border-radius: 6px; cursor: pointer; font-size: 13px; }

/* Mood selector */
#mood-bar {
    position: fixed;
    top: 14px;
    right: 14px;
    display: flex;
    gap: 6px;
    z-index: 99999;
}
.mood-btn {
    width: 28px; height: 28px;
    border-radius: 50%;
    border: 2px solid rgba(255,255,255,0.2);
    cursor: pointer;
    transition: transform 0.2s;
}
.mood-btn:hover { transform: scale(1.2); }

/* Compliment / Roast */
#compliment-box, #roast-box {
    font-size: 18px;
    text-align: center;
    min-height: 60px;
    display: flex;
    align-items: center;
    justify-content: center;
    margin: 12px 0;
    color: #fff;
    line-height: 1.4;
}
.fun-btn {
    display: block;
    width: 100%;
    background: #222;
    color: white;
    border: 1px solid #555;
    padding: 10px;
    border-radius: 8px;
    font-size: 15px;
    cursor: pointer;
    margin-top: 8px;
}
.fun-btn:hover { background: #333; }

/* Self destruct */
#destruct-num {
    font-size: 80px;
    text-align: center;
    color: #f44;
    font-family: monospace;
    font-weight: bold;
}
#destruct-msg { text-align: center; font-size: 16px; color: #aaa; margin-top: 8px; }

/* Fireworks */
.firework-particle {
    position: fixed;
    border-radius: 50%;
    pointer-events: none;
    width: 6px;
    height: 6px;
    z-index: 9998;
}

/* Ripple */
.ripple {
    position: fixed;
    border-radius: 50%;
    pointer-events: none;
    border: 2px solid rgba(255,255,255,0.6);
    transform: translate(-50%,-50%) scale(0);
    animation: rippleAnim 0.6s ease-out forwards;
    z-index: 9997;
}
@keyframes rippleAnim {
    to { transform: translate(-50%,-50%) scale(4); opacity: 0; }
}

/* Konami */
#konami-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: black;
    z-index: 9999999;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    font-family: sans-serif;
}
#konami-overlay.show { display: flex; }
#konami-text {
    font-size: 48px;
    color: #fff;
    animation: rainbow 0.5s linear infinite;
}
@keyframes rainbow {
    0%{color:#f00} 15%{color:#ff0} 33%{color:#0f0} 50%{color:#0ff} 66%{color:#00f} 83%{color:#f0f} 100%{color:#f00}
}
#konami-sub { color: #aaa; font-size: 16px; margin-top: 12px; }

/* Confetti */
.confetti-piece {
    position: fixed;
    width: 8px;
    height: 8px;
    pointer-events: none;
    z-index: 99998;
    animation: confettiFall linear forwards;
}
@keyframes confettiFall {
    to { transform: translateY(100vh) rotate(720deg); opacity: 0; }
}

/* Notes */
#notes-area {
    width: 100%;
    height: 200px;
    background: #1a1a1a;
    border: 1px solid #444;
    border-radius: 8px;
    color: white;
    font-size: 14px;
    padding: 10px;
    box-sizing: border-box;
    resize: none;
    font-family: sans-serif;
}
#notes-saved { font-size: 12px; color: #4f4; margin-top: 6px; display: none; }

/* Todo */
#todo-input-row { display: flex; gap: 8px; margin-bottom: 10px; }
#todo-input { flex: 1; background: #222; border: 1px solid #555; color: white; padding: 8px; border-radius: 6px; font-size: 14px; }
#todo-add { background: #333; color: white; border: 1px solid #555; padding: 8px 14px; border-radius: 6px; cursor: pointer; font-size: 14px; }
#todo-list { list-style: none; padding: 0; margin: 0; max-height: 200px; overflow-y: auto; }
#todo-list li {
    display: flex; align-items: center; gap: 8px;
    padding: 8px 0;
    border-bottom: 1px solid #222;
    font-size: 14px;
    color: white;
}
#todo-list li.done span { text-decoration: line-through; color: #666; }
#todo-list li button { background: none; border: none; color: #f44; cursor: pointer; font-size: 16px; padding: 0 4px; }
#todo-list li input[type=checkbox] { cursor: pointer; }

/* Color picker */
#color-picker-wrap { display: flex; gap: 12px; align-items: center; margin-top: 10px; }
#site-color-pick { width: 60px; height: 60px; border: none; background: none; cursor: pointer; border-radius: 8px; }
#color-label { font-size: 13px; color: #aaa; }

/* Font size */
#font-slider-wrap { display: flex; gap: 12px; align-items: center; margin-top: 10px; }
#font-size-slider { flex: 1; }
#font-size-val { font-size: 13px; color: #aaa; min-width: 30px; }

/* Stopwatch */
#stopwatch-display { font-size: 48px; font-family: monospace; text-align: center; color: #fff; margin: 10px 0; }
#stopwatch-btns { display: flex; gap: 8px; justify-content: center; }
#stopwatch-btns button { background: #222; color: white; border: 1px solid #555; padding: 8px 18px; border-radius: 8px; cursor: pointer; font-size: 14px; }
</style>
</head>

<script>
const start = Date.now();
const badge = document.createElement('div');
badge.style.cssText = `
  position: fixed;
  bottom: 20px;
  right: 20px;
  background: #1a1a1a;
  color: #fff;
  font-family: sans-serif;
  font-size: 13px;

  z-index: 99999;
  box-shadow: 0 4px 16px rgba(0,0,0,0.4);
  pointer-events: none;
`;
document.body.appendChild(badge);
setInterval(() => {
  const secs = Math.floor((Date.now() - start) / 1000);
  const m = Math.floor(secs / 60);
  const s = secs % 60;
  if (m === 0) badge.textContent = `⏱ ${s}s on this page`;
  else if (m === 1) badge.textContent = `⏱ 1 minute on this page`;
  else badge.textContent = `⏱ ${m} minutes on this page`;
}, 1000);
</script>

<!-- RIPPLE ON CLICK -->
<script>
document.addEventListener('click', (e) => {
  if (e.target.closest('#modal-overlay, #games-panel, #games-btn, #mood-bar, #pet-wrap')) return;
  const r = document.createElement('div');
  r.className = 'ripple';
  r.style.left = e.clientX + 'px';
  r.style.top = e.clientY + 'px';
  r.style.width = '60px'; r.style.height = '60px';
  document.body.appendChild(r);
  setTimeout(() => r.remove(), 700);
});
</script>

<!-- DOUBLE CLICK FIREWORK -->
<script>
document.addEventListener('dblclick', (e) => {
  if (e.target.closest('#modal-overlay, #games-panel, #games-btn')) return;
  const colors = ['#ff0','#f0f','#0ff','#f44','#4f4','#48f'];
  for (let i = 0; i < 24; i++) {
    const p = document.createElement('div');
    p.className = 'firework-particle';
    p.style.left = e.clientX + 'px';
    p.style.top = e.clientY + 'px';
    p.style.background = colors[Math.floor(Math.random()*colors.length)];
    const angle = (i / 24) * Math.PI * 2;
    const dist = 60 + Math.random() * 60;
    const tx = Math.cos(angle) * dist;
    const ty = Math.sin(angle) * dist;
    p.style.transition = `transform 0.7s ease-out, opacity 0.7s ease-out`;
    document.body.appendChild(p);
    requestAnimationFrame(() => {
      p.style.transform = `translate(${tx}px, ${ty}px)`;
      p.style.opacity = '0';
    });
    setTimeout(() => p.remove(), 800);
  }
});
</script>

// SNAKE
function startSnake() {
  const c = document.getElementById('snake-canvas');
  const x = c.getContext('2d');
  const SZ = 20, W = 14, H = 14;
  let snake = [{x:7,y:7}], dir = {x:1,y:0}, food = {x:3,y:3}, score = 0, running = true;
  function rndFood() { return {x:Math.floor(Math.random()*W), y:Math.floor(Math.random()*H)}; }
  function draw() {
    x.fillStyle='#000'; x.fillRect(0,0,280,280);
    x.fillStyle='#f44'; x.fillRect(food.x*SZ,food.y*SZ,SZ-1,SZ-1);
    snake.forEach((s,i) => { x.fillStyle = i===0?'#4f4':'#2a2'; x.fillRect(s.x*SZ,s.y*SZ,SZ-1,SZ-1); });
  }
  function step() {
    if (!running) return;
    const head = {x:(snake[0].x+dir.x+W)%W, y:(snake[0].y+dir.y+H)%H};
    if (snake.some(s=>s.x===head.x&&s.y===head.y)) { running=false; document.getElementById('snake-score').textContent='game over! score: '+score; return; }
    snake.unshift(head);
    if (head.x===food.x&&head.y===food.y) { score++; document.getElementById('snake-score').textContent='score: '+score; food=rndFood(); } else snake.pop();
    draw();
  }
  document.addEventListener('keydown', function snakeKey(e) {
    if (['ArrowUp','ArrowDown','ArrowLeft','ArrowRight'].includes(e.key)) e.preventDefault();
    if (e.key==='ArrowUp'&&dir.y===0) dir={x:0,y:-1};
    else if (e.key==='ArrowDown'&&dir.y===0) dir={x:0,y:1};
    else if (e.key==='ArrowLeft'&&dir.x===0) dir={x:-1,y:0};
    else if (e.key==='ArrowRight'&&dir.x===0) dir={x:1,y:0};
    if (!document.getElementById('snake-canvas')) document.removeEventListener('keydown',snakeKey);
  });
  const iv = setInterval(step, 130);
  window._gameCleanup = () => { running=false; clearInterval(iv); };
  draw();
}

// PONG
function startPong() {
  const c = document.getElementById('pong-canvas');
  const x = c.getContext('2d');
  let py=80,ay=80,bx=150,by=110,bdx=3,bdy=2,ps=0,as=0,running=true;
  c.addEventListener('mousemove',e=>{const r=c.getBoundingClientRect();py=e.clientY-r.top-30;});
  c.addEventListener('touchmove',e=>{e.preventDefault();const r=c.getBoundingClientRect();py=e.touches[0].clientY-r.top-30;},{passive:false});
  function draw(){
    x.fillStyle='#000';x.fillRect(0,0,300,220);
    x.fillStyle='#fff';x.fillRect(6,py,8,60);x.fillRect(286,ay,8,60);
    x.beginPath();x.arc(bx,by,7,0,Math.PI*2);x.fill();
  }
  function step(){
    if(!running)return;
    bx+=bdx;by+=bdy;
    if(by<7||by>213)bdy*=-1;
    if(bx<22&&by>py&&by<py+60){bdx=Math.abs(bdx);bdy+=(by-(py+30))*0.08;}
    if(bx>278&&by>ay&&by<ay+60){bdx=-Math.abs(bdx);}
    ay+=(by-ay-30)*0.06;
    if(bx<0){as++;ps=ps;document.getElementById('pong-score').textContent=`you: ${ps} — ai: ${as}`;bx=150;by=110;bdx=3;bdy=2;}
    if(bx>300){ps++;document.getElementById('pong-score').textContent=`you: ${ps} — ai: ${as}`;bx=150;by=110;bdx=-3;bdy=2;}
    draw();
  }
  const iv=setInterval(step,16);
  window._gameCleanup=()=>{running=false;clearInterval(iv);};
  draw();
}

// WHACK
function startWhack() {
  const grid = document.getElementById('whack-grid');
  let score=0,timeLeft=30,moleIdx=-1;

  const timeIv=setInterval(()=>{timeLeft--;document.getElementById('whack-score').textContent=`score: ${score} | time: ${timeLeft}s`;if(timeLeft<=0){clearInterval(moleIv);clearInterval(timeIv);if(moleIdx>=0)grid.children[moleIdx].textContent='🕳';document.getElementById('whack-score').textContent=`done! final score: ${score}`;}},1000);
  window._gameCleanup=()=>{clearInterval(moleIv);clearInterval(timeIv);};
}

// TYPING
function startTyping() {
  const words = 'the quick brown fox jumps over the lazy dog pack my box with five dozen liquor jugs how vexingly quick daft zebras jump'.split(' ');
  let idx=0,mistakes=0,startT=null;
  const textEl=document.getElementById('typing-text');
  const input=document.getElementById('typing-input');
  textEl.innerHTML=words.map((w,i)=>`<span id="tw${i}">${w} </span>`).join('');
  document.getElementById(`tw0`).className='current';
  input.addEventListener('input',()=>{
    if(!startT)startT=Date.now();
    const val=input.value;
    const word=words[idx];
    if(val.endsWith(' ')){
      const typed=val.trim();
      if(typed===word){document.getElementById(`tw${idx}`).className='done';}
      else{document.getElementById(`tw${idx}`).className='wrong';mistakes++;}
      idx++;input.value='';
      if(idx<words.length)document.getElementById(`tw${idx}`).className='current';
      else{const wpm=Math.round((words.length/((Date.now()-startT)/60000)));document.getElementById('typing-stats').textContent=`done! ${wpm} wpm, ${mistakes} mistakes`;}
    }
  });
  input.focus();
}

// RPS
function playRPS(choice) {
  const opts=['rock','paper','scissors'];
  const ai=opts[Math.floor(Math.random()*3)];
  const map={rock:'🪨',paper:'📄',scissors:'✂️'};
  let result='';
  if(choice===ai){window.rpsT++;result='tie!';}
  else if((choice==='rock'&&ai==='scissors')||(choice==='paper'&&ai==='rock')||(choice==='scissors'&&ai==='paper')){window.rpsW++;result='you win!';}
  else{window.rpsL++;result='you lose!';}
  document.getElementById('rps-result').textContent=`you: ${map[choice]} vs ai: ${map[ai]} — ${result}`;
  document.getElementById('rps-score').textContent=`wins: ${window.rpsW} | losses: ${window.rpsL} | ties: ${window.rpsT}`;
}

// MEMORY
function startMemory() {
  const emojis=['🐶','🐱','🦊','🐸','🦋','🐙','🦄','🍕'];
  let cards=[...emojis,...emojis].sort(()=>Math.random()-0.5);
  let flipped=[],matched=0,moves=0,locked=false;
  const grid=document.getElementById('memory-grid');
  cards.forEach((e,i)=>{
    const c=document.createElement('div');c.className='mem-card';c.textContent='❓';
    c.addEventListener('click',()=>{
      if(locked||c.classList.contains('matched')||c.classList.contains('flipped'))return;
      c.textContent=e;c.classList.add('flipped');flipped.push({el:c,val:e});
      if(flipped.length===2){moves++;document.getElementById('memory-moves').textContent=`moves: ${moves}`;locked=true;
        if(flipped[0].val===flipped[1].val){flipped[0].el.classList.add('matched');flipped[1].el.classList.add('matched');flipped=[];locked=false;matched++;if(matched===8)document.getElementById('memory-moves').textContent=`done in ${moves} moves!`;}
        else{setTimeout(()=>{flipped.forEach(f=>{f.el.textContent='❓';f.el.classList.remove('flipped');});flipped=[];locked=false;},900);}
      }
    });
    grid.appendChild(c);
  });
}

// TODO
function getTodos(){return JSON.parse(localStorage.getItem('brody-todos')||'[]');}
function saveTodos(t){localStorage.setItem('brody-todos',JSON.stringify(t));}
function renderTodos(){
  const list=document.getElementById('todo-list');if(!list)return;
  const todos=getTodos();list.innerHTML='';
  todos.forEach((t,i)=>{
    const li=document.createElement('li');if(t.done)li.classList.add('done');
    li.innerHTML=`<input type="checkbox" ${t.done?'checked':''}><span>${t.text}</span><button onclick="deleteTodo(${i})">✕</button>`;
    li.querySelector('input').addEventListener('change',()=>{todos[i].done=!todos[i].done;saveTodos(todos);renderTodos();});
    list.appendChild(li);
  });
}
function addTodo(){const input=document.getElementById('todo-input');if(!input.value.trim())return;const t=getTodos();t.push({text:input.value.trim(),done:false});saveTodos(t);input.value='';renderTodos();}
function deleteTodo(i){const t=getTodos();t.splice(i,1);saveTodos(t);renderTodos();}

// STOPWATCH
function swStart(){if(window._swRunning)return;window._swRunning=true;window._swStart=Date.now()-window._swElapsed;window._swInterval=setInterval(()=>{window._swElapsed=Date.now()-window._swStart;const t=window._swElapsed;const m=Math.floor(t/60000);const s=Math.floor((t%60000)/1000);const ms=Math.floor((t%1000)/100);const el=document.getElementById('stopwatch-display');if(el)el.textContent=`${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}.${ms}`;},100);}
function swStop(){window._swRunning=false;clearInterval(window._swInterval);}
function swReset(){swStop();window._swElapsed=0;const el=document.getElementById('stopwatch-display');if(el)el.textContent='00:00.0';}
</script>
